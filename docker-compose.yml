services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: forum
      MYSQL_USER: forum
      MYSQL_PASSWORD: forum
      TZ: Asia/Shanghai
    ports:
      - "3922:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d:ro

  web:
    build: .
    environment:
      APP_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: forum
      DB_USER: forum
      DB_PASS: forum
      SESSION_NAME: lite_forum_sess
      MODERATION_ENABLED: 1
      TZ: Asia/Shanghai
    ports:
      - "8922:80"
    depends_on:
      - db
    volumes:
      - .:/var/www/html

volumes:
  db_data:

